<!DOCTYPE html>
<html>
<head>
<title>Order Tracking</title>
<style>
body { font-family: Arial; background:#f5f5f5; padding:30px; }
.container { max-width:500px; background:white; padding:20px; border-radius:10px; }
input,button { width:100%; padding:10px; margin:8px 0; }
button { background:green; color:white; border:none; }
#result { margin-top:20px; }
</style>
</head>

<body>

<div class="container">
<h2>📦 Track Order</h2>

<input id="orderId" placeholder="Order ID">
<input id="waybill" placeholder="Waybill">

<button onclick="track()">Track & Save</button>

<div id="result"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwtfmzmGASPrGsUU-Z1O2SyiXr_oxROzhKmX7OjQ02yaCUnhzS9xA9RwHJOG9JSCHNoLw/exec";

async function track() {
  const orderId = document.getElementById("orderId").value;
  const waybill = document.getElementById("waybill").value;

  document.getElementById("result").innerHTML = "Loading...";

  try {
    const res = await fetch(`${API_URL}?orderId=${encodeURIComponent(orderId)}&waybill=${encodeURIComponent(waybill)}`);
    const data = await res.json();

    if (data.error) {
      document.getElementById("result").innerHTML = data.error;
      return;
    }

    document.getElementById("result").innerHTML = `
      <b>Status:</b> ${data.status}<br>
      <b>Location:</b> ${data.location}<br>
      <b>Customer:</b> ${data.customer}<br>
      <b>Payment:</b> ${data.payment}<br>
      <b>Amount:</b> ₹${data.amount}
    `;

  } catch (err) {
    document.getElementById("result").innerHTML = "Error fetching data";
  }
}

</script>

</body>
</html>
